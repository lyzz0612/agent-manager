name: CI

on:
  push:
    branches:
      - master
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - master

# CI 仅做验证：lint / typecheck / test。
# 严禁发布 npm、push Docker 镜像或创建 GitHub Release。
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Test
        run: pnpm -r --if-present test

      - name: Guard against publish leaks
        run: |
          # 防呆：CI 不应执行任何发布动作。
          if grep -RIn --line-number -E "(npm publish|docker push|gh release create)" .github/workflows/ci.yml; then
            echo "CI workflow must not contain publish commands" >&2
            exit 1
          fi
