name: _publish-image

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      repo_lower:
        required: true
        type: string
      is_tag:
        required: true
        type: string
      tag_suffix:
        required: true
        type: string
      latest_tag:
        required: true
        type: string
      dockerfile:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 校验 Dockerfile 存在
        env:
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: |
          set -euo pipefail
          if [[ ! -f "$DOCKERFILE" ]]; then
            echo "::error::Dockerfile $DOCKERFILE 不存在；请先在 server 包中提供该镜像构建文件"
            exit 1
          fi

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 计算镜像 tag 列表
        id: tags
        env:
          REPO_LOWER: ${{ inputs.repo_lower }}
          VERSION: ${{ inputs.version }}
          SUFFIX: ${{ inputs.tag_suffix }}
          LATEST: ${{ inputs.latest_tag }}
          IS_TAG: ${{ inputs.is_tag }}
        run: |
          set -euo pipefail
          image="ghcr.io/$REPO_LOWER/agentops-server"
          tags="$image:$VERSION$SUFFIX"
          if [[ "$IS_TAG" == "true" ]]; then
            tags="$tags"$'\n'"$image:$LATEST"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ inputs.version }}
